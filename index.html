<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LXV Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #030303;
            --card-bg: rgba(20, 20, 20, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --hover-glow: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(20, 20, 20, 0.6) 0%, transparent 60%),
                radial-gradient(circle at 85% 30%, rgba(30, 30, 30, 0.4) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient light behind the card */
        .ambient-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            z-index: 0;
            border-radius: 50%;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .card-container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 45px 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .card-container:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9), 0 0 40px rgba(255, 255, 255, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
            z-index: 2;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a, #050505);
            border: 1px solid rgba(255,255,255,0.15);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--text-main);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.1);
            position: relative;
            transition: all 0.4s ease;
        }

        /* Ambient glowing pulse on the avatar */
        .avatar::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 60%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card-container:hover .avatar::after {
            opacity: 1;
        }

        .card-container:hover .avatar {
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.1), inset 0 2px 4px rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.25);
        }

        .company {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .name {
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .role {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 25px;
        }
        
        .tagline {
            font-size: 11px;
            letter-spacing: 2px;
            color: #777;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 12px 0;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .card-container:hover .tagline {
            color: #999;
            border-color: rgba(255,255,255,0.1);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 2;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Glass highlight on top edge */
        .link-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), 0 0 20px rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }

        .link-item:hover::after {
            opacity: 1;
        }

        .link-item:active {
            transform: translateY(0);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2), 0 0 25px rgba(255,255,255,0.1) inset;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .link-icon {
            font-size: 18px;
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-right: 18px;
            color: #aaa;
            transition: all 0.4s ease;
            position: relative;
        }
        
        /* Slight glow behind icon on hover */
        .link-item:hover .link-icon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25px;
            height: 25px;
            background: var(--hover-glow);
            filter: blur(15px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.5;
        }

        .link-item:hover .link-icon {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .link-text-container {
            display: flex;
            flex-direction: column;
            z-index: 1;
            flex-grow: 1;
        }

        .link-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 2px;
            color: #eaeaea;
            transition: color 0.3s ease;
        }
        
        .link-item:hover .link-title {
            color: #fff;
        }

        .link-subtitle {
            font-size: 13px;
            color: #888;
            font-weight: 300;
            transition: color 0.3s ease;
        }

        .link-item:hover .link-subtitle {
            color: #b0b0b0;
        }

        .link-arrow {
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            transition: all 0.4s ease;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: transparent;
        }

        .link-item:hover .link-arrow {
            color: #fff;
            background: rgba(255,255,255,0.15);
            transform: translateX(3px);
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        /* Mouse tracking light effect */
        .mouse-glow {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
            z-index: 0;
            transform: translate(-50%, -50%);
        }

        .card-container:hover .mouse-glow {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .card-container {
                padding: 40px 25px;
                border-radius: 24px;
            }
            .name {
                font-size: 28px;
            }
            .link-item {
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="card-container" id="card">
        <div class="mouse-glow" id="glow"></div>
        <div class="profile-header">
            <div class="avatar">
                <img src="logo.png" alt="LXV Studio Logo" style="width: 100%; height: 100%; border-radius: 50%; object-fit: contain;">
            </div>
            <div class="company">LXV Studio</div>
            <div class="tagline">MARKETING & DESIGN • THRISSUR</div>
        </div>

        <div class="links-container">
            <!-- Phone -->
            <a href="tel:+919495558841" class="link-item">
                <div class="link-icon">
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div class="link-text-container">
                    <div class="link-title">Phone</div>
                    <div class="link-subtitle">+91 9495558841</div>
                </div>
                <div class="link-arrow">
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </a>

            <!-- WhatsApp -->
            <a href="https://wa.me/919495558841" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
                <div class="link-text-container">
                    <div class="link-title">WhatsApp</div>
                    <div class="link-subtitle">9495558841</div>
                </div>
                <div class="link-arrow">
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </a>

            <!-- Email -->
            <a href="mailto:lxvstudio.in@gmail.com" class="link-item">
                <div class="link-icon">
                    <i class="fa-regular fa-envelope"></i>
                </div>
                <div class="link-text-container">
                    <div class="link-title">Email</div>
                    <div class="link-subtitle">lxvstudio.in@gmail.com</div>
                </div>
                <div class="link-arrow">
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </a>

            <!-- Website -->
            <a href="https://www.lxvstudio.com" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fa-solid fa-globe"></i>
                </div>
                <div class="link-text-container">
                    <div class="link-title">Website URL</div>
                    <div class="link-subtitle">www.lxvstudio.com</div>
                </div>
                <div class="link-arrow">
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </a>

            <!-- Instagram -->
            <a href="https://instagram.com/lxvstudio__" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <div class="link-text-container">
                    <div class="link-title">Instagram Handle</div>
                    <div class="link-subtitle">lxvstudio__</div>
                </div>
                <div class="link-arrow">
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </a>

            <!-- Location -->
            <a href="https://maps.google.com/?q=Wesfort,Thrissur,Kerala" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="link-text-container">
                    <div class="link-title">Location</div>
                    <div class="link-subtitle">Wesfort, Thrissur, Kerala</div>
                </div>
                <div class="link-arrow">
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </a>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const glow = document.getElementById('glow');

        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            glow.style.left = x + 'px';
            glow.style.top = y + 'px';
        });

        card.addEventListener('mouseleave', () => {
            glow.style.opacity = '0';
        });
        
        card.addEventListener('mouseenter', () => {
            glow.style.opacity = '1';
        });
    </script>
</body>
</html>
